<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f4f0;--surface:#ffffff;--surface2:#f0efe9;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);

  --amber:#854f0b;--amber-bg:#faeeda;
  --red:#a32d2d;--red-bg:#fcebeb;
  --radius:12px;--radius-sm:8px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);--shadow-lg:0 8px 40px rgba(0,0,0,0.10);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:2rem 1rem 3rem;}
.page-header{width:100%;max-width:700px;margin-bottom:1.5rem;display:flex;align-items:center;gap:14px;}
.logo-mark{width:48px;height:48px;border-radius:14px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--shadow);}
.logo-mark svg{width:24px;height:24px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.page-title h1{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;color:var(--text);letter-spacing:-0.3px;}
.page-title p{font-size:13px;color:var(--text2);margin-top:2px;}
.chat-shell{width:100%;max-width:700px;background:var(--surface);border-radius:18px;border:1px solid var(--border);box-shadow:var(--shadow-lg);overflow:hidden;display:flex;flex-direction:column;}
.top-bar{background:var(--accent);padding:1rem 1.25rem;display:flex;align-items:center;gap:12px;}
.bot-avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bot-avatar svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.bot-info h2{font-size:15px;font-weight:600;color:#fff;}
.bot-info p{font-size:12px;color:rgba(255,255,255,0.7);margin-top:1px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:#5dcaa5;margin-left:auto;box-shadow:0 0 0 2px rgba(93,202,165,0.3);}
.breadcrumb{padding:10px 1.25rem;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-height:38px;}
.breadcrumb.hidden{display:none;}
.bc-link{font-size:12px;color:var(--accent-mid);cursor:pointer;text-decoration:none;font-weight:500;}
.bc-link:hover{text-decoration:underline;}
.bc-sep{font-size:12px;color:var(--text3);}
.bc-current{font-size:12px;color:var(--text2);}
.messages{padding:1.5rem 1.25rem 1rem;display:flex;flex-direction:column;gap:1rem;min-height:180px;}
.bubble{max-width:88%;padding:0.8rem 1rem;font-size:14px;line-height:1.65;}
.bubble.bot{background:var(--surface2);color:var(--text);border-radius:4px 14px 14px 14px;align-self:flex-start;border:1px solid var(--border);}
.bubble strong{font-weight:600;}
.incidence-card{background:var(--accent-light);border-left:3px solid var(--accent-mid);border-radius:0 10px 10px 0;padding:1rem 1.1rem;font-size:13.5px;line-height:1.7;color:var(--text);}
.inc-label{display:inline-block;font-size:10.5px;font-weight:600;letter-spacing:0.6px;text-transform:uppercase;color:var(--accent-text);background:rgba(83,74,183,0.12);padding:3px 10px;border-radius:20px;margin-bottom:10px;}
.detail-content{font-size:13.5px;line-height:1.7;color:var(--text);}
.detail-content ul{padding-left:0;list-style:none;display:flex;flex-direction:column;gap:8px;}
.detail-content li{display:flex;gap:10px;align-items:flex-start;}
.detail-content li::before{content:'';display:block;width:6px;height:6px;border-radius:50%;background:var(--accent-mid);flex-shrink:0;margin-top:8px;}
.hint-text{font-size:12.5px;color:var(--text3);margin-top:6px;}
.options-area{padding:0.5rem 1.25rem 1.5rem;display:flex;flex-direction:column;gap:8px;}
.opts-label{font-size:11.5px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text3);margin-bottom:2px;margin-top:4px;}
.opt-btn{display:flex;align-items:center;gap:12px;padding:0.75rem 1rem;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);text-align:left;transition:background 0.15s,border-color 0.15s,transform 0.1s;width:100%;}
.opt-btn:hover{background:var(--surface2);border-color:var(--accent-mid);}
.opt-btn:active{transform:scale(0.99);}
.opt-btn .num{font-size:12px;font-weight:700;color:var(--accent-mid);min-width:22px;height:22px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.opt-btn .icon-wrap{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.opt-btn .icon-wrap svg{width:16px;height:16px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.opt-btn .btn-label{flex:1;font-weight:500;}
.opt-btn .chevron{margin-left:auto;flex-shrink:0;}
.opt-btn .chevron svg{width:14px;height:14px;fill:none;stroke:var(--text3);stroke-width:2;}
.opt-btn.back-btn{color:var(--text2);border-style:dashed;border-color:var(--border);font-weight:400;}
.opt-btn.back-btn:hover{color:var(--text);border-color:var(--border2);}
.opt-btn.impact .icon-wrap{background:var(--amber-bg);}
.opt-btn.impact .icon-wrap svg{stroke:var(--amber);}
.opt-btn.laws .icon-wrap{background:var(--success-bg);}
.opt-btn.laws .icon-wrap svg{stroke:var(--success);}
.opt-btn.justice .icon-wrap{background:var(--red-bg);}
.opt-btn.justice .icon-wrap svg{stroke:var(--red);}
.divider{height:1px;background:var(--border);margin:4px 0;}
.chat-footer{padding:0.65rem 1.25rem;background:var(--surface2);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.footer-text{font-size:11.5px;color:var(--text3);}
.footer-dot{width:3px;height:3px;border-radius:50%;background:var(--text3);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.animate-in{animation:fadeUp 0.2s ease forwards;}
@media(max-width:500px){body{padding:1rem 0.5rem 2rem;}.bubble{max-width:95%;}}
</style>

<script>
const DATA = {
  "Insider Dealing": { cases: {
    "RIL \u2013 RPL Shares Manipulation Case": {
      incidence: "Reliance Industries Limited (RIL), India\u2019s largest private sector company, incorporated Reliance Petroleum Limited (RPL) as a subsidiary in 2006. In March 2007, RIL planned to sell a 5% stake in RPL. Rather than a straightforward sale, RIL used twelve front agents to bypass regulatory position limits in November 2007. These agents \u2014 with no prior derivatives history \u2014 cornered over 93% of the open interest in November RPL futures, building massive short positions averaging \u20b9265.67 per share. Simultaneously, RIL aggressively sold approximately 202.9 million RPL shares to artificially depress the stock. On futures expiry day (November 29, 2007), RIL dumped 22.5 million shares in the final ten minutes, crashing the settlement price to \u20b9215.25 per share \u2014 generating unlawful gains of \u20b9447.27 crore.",
      "Impact": ["Retail and institutional investors suffered massive losses as the artificially depressed settlement price transferred wealth from uninformed market participants to RIL and its agents.","By cornering over 93% of open interest, RIL crippled normal price discovery, replacing genuine supply and demand with artificial selling pressure.","SEBI determined that RIL generated \u20b9447.27 crore in illegal profits within the futures segment.","The scheme severely undermined public trust in the fairness of India\u2019s derivatives market.","As India\u2019s largest private sector corporation, RIL faced significant reputational fallout, attracting intense media scrutiny and political backlash."],
      "Existing Laws": ["SEBI Act, 1992 (Sections 11, 11B, 12A) \u2014 granted SEBI statutory power to investigate misconduct and issue regulatory directives against RIL and associated entities.","Insider Trading Regulations, 1992 \u2014 used during the initial probe to investigate potential insider access to RPL\u2019s strategic plans.","PFUTP Regulations, 2003 (Regulations 3 & 4) \u2014 basis for SEBI\u2019s 2017 disgorgement order; the Supreme Court overturned the fraud findings in May 2026.","Derivatives Position Limit Rules, 2001 \u2014 limits bypassed via 12 front agents; Supreme Court upheld the \u20b925 crore regulatory penalty in May 2026."],
      "Justice & Punishment": ["SEBI Disgorgement Order (March 2017): RIL ordered to disgorge \u20b9447.27 crore plus 12% annual interest; banned from F&O segment for one year.","SAT Appeal (November 2020): 2:1 majority upheld SEBI\u2019s manipulation findings and the full disgorgement amount.","SEBI Penalty Order (January 2021): \u20b970 crore total \u2014 \u20b925 cr on RIL, \u20b915 cr personally on Mukesh Ambani, \u20b930 cr on two associated SEZ entities.","Supreme Court Ruling (May 2026): Overturned fraud findings and \u20b9447.27 cr disgorgement; ordered SEBI to refund \u20b9250 crore to RIL while upholding the \u20b925 crore position-limit penalty."]
    },
    "Hindustan Lever \u2013 BBLIL Insider Dealings Case": {
      incidence: "Hindustan Lever Limited (HLL) shared five common directors with Brooke Bond Lipton India Limited (BBLIL), both Unilever Indian subsidiaries. In the mid-1990s, Unilever decided to merge the two companies, and senior management had prior knowledge before any public disclosure. Armed with this confidential information, HLL purchased 8 lakh BBLIL shares from the Unit Trust of India (UTI) on March 25, 1996 \u2014 two weeks before the formal public announcement \u2014 at \u20b9350.35 per share. Because HLL possessed Unpublished Price-Sensitive Information (UPSI) and shared common management with BBLIL, SEBI deemed the company an \u2018insider\u2019 and initiated India\u2019s very first insider trading action.",
      "Impact": ["UTI suffered a direct financial loss by selling its shares at a price that failed to reflect the impending merger premium.","Market integrity was compromised by granting HLL an illegitimate informational advantage over uninformed market participants.","As SEBI\u2019s very first insider trading action, the case exposed critical weaknesses in India\u2019s nascent enforcement machinery.","Public trust was deeply shaken by the revelation that a reputable multinational would engage in insider dealing.","The appellate outcome created systemic ambiguity regarding the legal definition of UPSI when information is already circulating through media speculation."],
      "Existing Laws": ["SEBI (Prohibition of Insider Trading) Regulations, 1992 (Sections 2(e), 2(k), 3, 4) \u2014 defined insiders and prohibited trading while in possession of UPSI.","SEBI Act, 1992 (Sections 11, 11B) \u2014 granted statutory authority to investigate and issue enforcement orders.","Section 24, SEBI Act \u2014 allowed criminal prosecution of directors who knowingly participated in insider trading."],
      "Justice & Punishment": ["SEBI\u2019s Order (March 1998): HLL found guilty; ordered to pay \u20b93.04 crore in compensation to UTI; criminal prosecution launched against five executive directors.","Securities Appellate Authority (SAA) Ruling: Overturned SEBI\u2019s findings. The SAA ruled the merger was \u2018generally known\u2019 from newspaper speculation and did not qualify as UPSI. HLL was acquitted and criminal prosecution was dropped."]
    },
    "Rajat Gupta \u2013 Galleon Group Insider Tipping Case": {
      incidence: "Rajat Gupta, an India-born global business leader and board member of Goldman Sachs and Procter & Gamble, maintained a close personal and financial relationship with Raj Rajaratnam, founder of the Galleon Group hedge fund. During the 2008 global financial crisis, Gupta participated in confidential Goldman Sachs board calls and learned of a forthcoming US$5 billion investment by Berkshire Hathaway, as well as quarterly results, before any public disclosure. Within minutes of leaving these calls, Gupta telephoned Rajaratnam, who immediately directed Galleon to buy or dump large blocks of Goldman Sachs stock. By converting privileged boardroom knowledge into trading instructions, Gupta enabled Galleon to generate illicit profits and avert losses estimated at over US$23 million.",
      "Impact": ["Counterparties on the other side of Galleon\u2019s trades absorbed avoidable losses, as wealth was transferred from uninformed participants to a fund acting on stolen boardroom intelligence.","The selective leak corrupted price discovery around two of the most closely watched stocks of the financial crisis.","Gupta\u2019s downfall cast a long shadow over the Indian corporate diaspora and the perceived integrity of elite boardrooms.","The case shook investor faith in the sanctity of corporate boards, demonstrating that even a director of the world\u2019s most prestigious firms could weaponise confidential deliberations for private gain.","The scandal triggered a global tightening of board confidentiality protocols and intensified scrutiny of relationships between independent directors and money managers."],
      "Existing Laws": ["US Securities Exchange Act, 1934 (Sections 10(b) and 14(e)) \u2014 formed the basis of criminal prosecution by prohibiting fraud in connection with the purchase or sale of securities.","SEC Rule 10b-5 \u2014 invoked to charge Gupta with tipping confidential information in breach of his fiduciary duty.","SEBI (Prohibition of Insider Trading) Regulations \u2014 cited as the parallel Indian framework that would equally classify a director\u2019s communication of UPSI as a prohibited offence."],
      "Justice & Punishment": ["Criminal Conviction (June 2012): A federal jury in Manhattan found Gupta guilty on multiple counts of securities fraud and conspiracy.","Custodial Sentence: Gupta was sentenced to two years in federal prison and ordered to pay a US$5 million criminal fine; he served his term before release in 2016.","SEC Civil Penalty and Bar: The SEC imposed a US$13.9 million penalty and permanently barred Gupta from serving as an officer or director of any public company."]
    },
    "Dilip Pendse \u2013 Nishkalp Investments (Tata Finance) Insider Trading Case": {
      incidence: "Dilip Pendse was the Managing Director of Tata Finance Limited, a non-banking financial company within the Tata group. He had privileged access to the deteriorating financial condition of Nishkalp Investments and Trading Company, a wholly owned subsidiary of Tata Finance that had accumulated heavy, undisclosed losses by early 2001. Possessing this Unpublished Price-Sensitive Information about the impending crisis, Pendse allegedly tipped off his wife and associated parties before the losses were made public. Acting on the warning, shares of Tata Finance were sold ahead of the formal disclosure, allowing connected persons to escape the sharp fall in value that followed.",
      "Impact": ["Public shareholders who continued to hold Tata Finance shares without knowledge of the Nishkalp losses bore the full brunt of the subsequent value erosion, while insiders exited in time.","The selective disclosure undermined the principle of equal access to information, granting insiders an unfair head start over the uninformed investing public.","The episode embarrassed the Tata group, long regarded as a benchmark for ethical corporate governance in India, forcing the parent to publicly reassure markets and infuse capital.","As one of SEBI\u2019s prominent early insider trading pursuits, the case exposed the practical difficulty of proving the flow of tips in nascent Indian securities law.","Faith in the reliability of NBFC disclosures was shaken, prompting closer scrutiny of subsidiary-level losses concealed within larger corporate groups."],
      "Existing Laws": ["SEBI (Prohibition of Insider Trading) Regulations, 1992 \u2014 applied to prohibit insiders from dealing in securities while in possession of UPSI and from communicating such information to connected parties.","SEBI Act, 1992 (Sections 11, 11B and 11C) \u2014 granted SEBI statutory authority to investigate the leak, summon records, and pass directions against the insider and connected persons.","Companies Act provisions on Director Duties \u2014 invoked to address the breach of fiduciary responsibility by a managing director who exploited confidential information for related parties."],
      "Justice & Punishment": ["SEBI Prohibitory Order: SEBI restrained Dilip Pendse from associating with or dealing in the securities market for a specified period on account of the insider trading violations.","Protracted Litigation: The matter became entangled in prolonged proceedings before the Securities Appellate Tribunal, illustrating how slowly early insider trading actions moved through the Indian legal system.","Parallel Criminal Complaints: Separate criminal and civil complaints relating to the broader Tata Finance affair were pursued, reinforcing that leaking price-sensitive information could attract liability beyond regulatory penalties."]
    },
    "Manmohan Shetty / Adlabs \u2013 Promoter Insider Dealing Inquiry": {
      incidence: "Adlabs Films, a prominent film processing and multiplex business, attracted a major strategic investment from the Reliance ADA Group \u2014 a development known to its promoters and senior management well before any public announcement. Armed with advance knowledge of the impending change in control and the premium it would command, persons connected to the promoter group were alleged to have dealt in the company\u2019s shares ahead of the public disclosure. By trading while in possession of this Unpublished Price-Sensitive Information, the connected parties captured gains that should not have been available to anyone outside the circle of confidentiality.",
      "Impact": ["Ordinary shareholders who transacted with informed insiders effectively surrendered the value of the control premium, suffering a quiet but real wealth transfer to connected parties.","Pre-announcement trading on confidential deal information distorted the share price ahead of disclosure, corrupting the orderly absorption of news by the market.","The inquiry highlighted the persistent challenge of policing promoter-connected accounts, where layers of relatives obscure the true beneficiary of insider trades.","Retail investors in the media and entertainment sector grew wary that promoters could routinely front-run their own strategic deals.","The episode reinforced the need for promoters to maintain trading windows, pre-clearance systems, and insider registers."],
      "Existing Laws": ["SEBI (Prohibition of Insider Trading) Regulations \u2014 prohibited connected persons and promoters from trading while in possession of UPSI relating to the strategic investment and change in control.","SEBI Act, 1992 (Sections 11, 11B and 15G) \u2014 empowered SEBI to investigate the trades, issue directions, and levy monetary penalties prescribed for insider trading contraventions.","SEBI (Substantial Acquisition of Shares and Takeovers) Regulations \u2014 engaged because the underlying event involved a change in control, layering takeover disclosure obligations on top of the insider trading prohibitions."],
      "Justice & Punishment": ["SEBI Investigation and Directions: SEBI examined the trading patterns of connected accounts around the deal announcement and pursued directions and penalties against those found to have dealt on price-sensitive information.","Disgorgement of Unlawful Gains: Where illicit profits were established, the regulator sought disgorgement of the wrongful gains together with interest.","Compliance Reforms: The scrutiny pushed the company and its promoters toward stronger insider trading controls, trading window closures, and documented pre-clearance procedures."]
    }
  }},
  "Market Abuse": { cases: {
    "Harshad Mehta Securities Scam (1992)": {
      incidence: "Harshad Mehta, a prominent stockbroker widely dubbed the \u2018Big Bull\u2019, orchestrated a fraudulent trading scheme to artificially inflate share prices on the Bombay Stock Exchange. He exploited weak controls within the banking sector, colluding with officials to secure unsecured funds and fake bank receipts. By illicitly diverting massive capital from the banking system into the stock market, Mehta drove prices to extraordinary heights \u2014 ACC shares skyrocketed from around \u20b9200 to nearly \u20b99,000. Once peak-inflated, Mehta liquidated positions to lock in massive profits and returned borrowed capital before the fraud was uncovered. Total unlawful gains exceeded \u20b93,500\u20134,000 crore (~US$1 billion in 1992 terms).",
      "Impact": ["The exposure triggered a massive market crash, wiping out substantial market capitalisation and inflicting severe losses on retail and institutional investors.","The scheme disrupted the asset pricing system by substituting genuine market supply and demand with artificial, capital-driven price inflation.","The crisis exposed deep institutional flaws in India\u2019s paper-based settlement framework and a critical deficit in regulatory oversight.","Public trust in the stock exchange collapsed and the banking sector faced a severe liquidity crunch.","The scale of the scam forced an immediate reassessment of financial transaction transparency and clearing procedures across India."],
      "Existing Laws": ["Joint Parliamentary Committee (JPC) Mandate, 1992 \u2014 established to probe regulatory gaps; 1993 report demanded tighter supervision over banking and market intersections.","SEBI Act, 1992 (Reinforced Framework) \u2014 amended post-scam with expanded autonomous authority to investigate and penalise market misconduct.","Banking Regulation Directives (RBI) \u2014 restricted bank exposure to securities and eliminated loopholes surrounding bank receipt management."],
      "Justice & Punishment": ["CBI and SEBI initiated sweeping civil and criminal fraud proceedings against Harshad Mehta and associates.","SEBI handed down permanent market exclusions and substantial financial penalties against Mehta and affiliated entities.","Mehta was arrested in 1992 and remained in litigation until his death in 2001. Partial asset recovery left a major portion of investor losses uncompensated; institutional reform became the case\u2019s primary legacy."]
    },
    "NSE Co-Location Scandal (2010\u20132015)": {
      incidence: "The NSE co-location scandal involved preferential market access granted to a select group of trading firms at India\u2019s largest stock exchange. Specific brokerages \u2014 most notably OPG Securities \u2014 manipulated the NSE\u2019s \u2018tick-by-tick\u2019 data feed by logging into co-location servers at optimised intervals to secure the fastest connections, receiving critical price data milliseconds ahead of other participants. Senior NSE insiders allegedly colluded by steering favoured brokers to the quickest server nodes, creating a multi-tiered information environment that systematically advantaged a privileged few.",
      "Impact": ["Regular investors suffered ongoing financial erosion by executing trades against a structurally advantaged counterparty.","The core principle of equitable market access was broken, establishing a multi-tiered information environment that favoured institutional insiders.","The scandal proved market abuse could originate from technological gaps inside exchange infrastructure itself.","Public exposure of whistle-blower complaints in 2015\u201316 severely tarnished the NSE\u2019s global reputation and derailed its planned IPO.","The case forced a broad industry realisation that high-frequency trading technologies required aggressive algorithmic oversight."],
      "Existing Laws": ["SEBI (Prohibition of Fraudulent and Unfair Trade Practices) Regulations \u2014 invoked following a 2016 TAC probe to penalise the NSE for failing to ensure fair infrastructure access.","SEBI Market Infrastructure Regulations \u2014 mandated equal data dissemination architectures and strict guidelines preventing information asymmetry.","Anti-Corruption and PMLA statutes \u2014 applied to investigate criminal employee collusion, data manipulation, and illicit wealth accumulation."],
      "Justice & Punishment": ["SEBI Disgorgement and Blockade (April 2019): NSE ordered to disgorge \u20b9624.9 crore plus accumulated interest; barred from tapping capital markets for six months.","Former MD & CEO Chitra Ramkrishna and other senior executives faced heavy fines and five-year bans from market infrastructure positions.","OPG Securities and participating brokerages faced suspensions and fines. CBI and ED launched criminal probes; NSE completely revamped its data distribution technology."]
    },
    "Ketan Parekh Securities Scam (2001)": {
      incidence: "Ketan Parekh, a Mumbai-based stockbroker once mentored within the Harshad Mehta circle, orchestrated a major market manipulation episode during the technology and dot-com boom. He concentrated his manipulation on a clutch of stocks known as the \u2018K-10\u2019 scrips, aggressively ramping their prices far beyond fundamental value through coordinated buying. Parekh financed his operations by raising enormous sums from cooperative banks \u2014 most notoriously Madhavpura Mercantile Cooperative Bank \u2014 often against inadequate security. He then deployed circular trading among a web of front entities to create the artificial appearance of heavy demand, luring genuine investors into the inflated stocks. When the market turned, the K-10 stocks collapsed and the scheme unravelled.",
      "Impact": ["Retail investors who bought into the artificially inflated K-10 stocks suffered catastrophic losses when prices crashed.","Circular trading and concentrated ramping replaced genuine supply and demand with a manufactured illusion of liquidity, corrupting price discovery.","The collapse of Madhavpura Mercantile Cooperative Bank triggered a wider crisis of confidence in India\u2019s cooperative banking sector.","Coming less than a decade after the Harshad Mehta scam, the episode renewed public despair over the integrity of Indian markets.","The scam accelerated the shift toward rolling settlement and curtailment of carry-forward mechanisms that had allowed leveraged speculation to flourish."],
      "Existing Laws": ["SEBI (Prohibition of Fraudulent and Unfair Trade Practices) Regulations \u2014 invoked to outlaw circular trading, price manipulation, and creation of artificial volumes.","SEBI Act, 1992 (Sections 11, 11B and 11C) \u2014 provided the statutory basis to investigate the manipulation, restrain persons involved, and pass disgorgement and debarment orders.","Banking Regulation and RBI Directives \u2014 engaged to address improper lending by Madhavpura Mercantile Cooperative Bank and tighten exposure norms."],
      "Justice & Punishment": ["SEBI Market Ban: SEBI barred Ketan Parekh and associated entities from accessing the securities market for fourteen years \u2014 one of the longest prohibitions imposed at the time.","Criminal Prosecution and Conviction: CBI pursued criminal proceedings arising from the bank funding and manipulation, leading to conviction and imprisonment.","Ongoing Enforcement: SEBI continued to act against fresh attempts by Parekh and connected fronts to re-enter the market through proxies."]
    },
    "SEBI v. Rakhi Trading \u2013 Synchronised and Reversal Trades in Derivatives": {
      incidence: "The Rakhi Trading matter concerned sophisticated market abuse in the stock options segment of the NSE. Certain entities, including Rakhi Trading Private Limited, executed large numbers of synchronised and reversal trades in illiquid options contracts, deliberately matching their orders with predetermined counterparties at non-genuine prices. By placing buy and sell orders that were reversed within a very short interval at artificial prices, the parties manufactured fictitious trading volumes and transferred profits and losses between connected accounts without taking any real market risk \u2014 pre-arranged trades designed to create a false appearance of activity and distort the integrity of the derivatives market.",

      "Impact": ["Banks and lenders absorbed thousands of crores in non-performing loans, while shareholders and creditors saw their stakes rendered worthless.","Continued borrowing and operation despite effective insolvency misled lenders and the market, distorting credit allocation in the aviation sector.","The episode exposed weaknesses in bank lending appraisal, collateral valuation, and monitoring of large corporate exposures.","The grounding of a high-profile carrier and the promoter\u2019s flight abroad dented public confidence in corporate accountability.","Thousands of Kingfisher employees were left unpaid and jobless for extended periods, suffering acute financial hardship."],

      "Justice & Punishment": ["Fugitive Economic Offender Declaration: An Indian court declared Vijay Mallya a fugitive economic offender, enabling authorities to confiscate his assets to satisfy creditors.","Extradition Proceedings: UK courts approved Mallya\u2019s extradition to India, though he pursued further appeals and asylum-related proceedings to resist return.","Asset Recovery: Banks and the Enforcement Directorate recovered substantial sums through the attachment and sale of assets, recouping a meaningful portion of defaulted loans."]
    },
    "DHFL (Dewan Housing Finance) Loan Fraud": {
      incidence: "Dewan Housing Finance Corporation Limited (DHFL), one of India\u2019s largest housing finance companies, became the centre of what the CBI described as one of the largest banking frauds in the country. The promoters allegedly routed loan funds \u2014 drawn from a consortium of seventeen banks extending credit of around \u20b934,000 crore \u2014 through a vast network of shell and dummy companies and fictitious borrowers. Investigations pointed to thousands of fabricated home-loan accounts, the so-called \u2018Bandra Books\u2019, used to siphon money into entities controlled by the promoters. By continuing to raise public deposits and bank borrowings while diverting proceeds and concealing the true state of the loan book, management defrauded creditors on a massive scale.",
      "Impact": ["Banks, bondholders, and fixed-deposit holders faced enormous losses as the scale of the diversion emerged and DHFL entered resolution, with recoveries far below dues.","The concealment of fictitious loans projected a false picture of a sound housing financier, distorting credit and capital allocation across the NBFC sector.","The fraud intensified the broader NBFC liquidity crisis and exposed weaknesses in the supervision of large housing finance companies.","Retail bondholders and depositors, including many ordinary savers, lost faith in the safety of NBFC instruments.","DHFL became the first major financial-sector firm resolved under the insolvency framework, setting an important precedent for handling NBFC failures."],
      "Existing Laws": ["Indian Penal Code (IPC), 1860 \u2014 applied through criminal conspiracy, cheating, and criminal breach of trust provisions regarding diversion of bank funds.","Prevention of Money Laundering Act (PMLA), 2002 \u2014 used by the Enforcement Directorate to trace layered movement of diverted funds into shell companies and personal assets.","Insolvency and Bankruptcy Code, 2016 \u2014 invoked to place DHFL into a resolution process under an administrator, ultimately leading to its acquisition by Piramal Group.","Companies Act, 2013 (Section 447) \u2014 engaged to address structural corporate fraud by the promoters and anchor prosecution for falsification and diversion."],
      "Justice & Punishment": ["Arrests of Promoters: The CBI and Enforcement Directorate arrested promoters Kapil and Dheeraj Wadhawan in connection with the fraud and laundering of diverted funds.","Resolution and Acquisition: Under the insolvency process, DHFL was acquired by the Piramal Group, allowing partial recovery for the consortium of creditors.","Asset Attachments and Ongoing Trial: Authorities attached assets linked to the promoters and pursued continuing prosecution, while creditors absorbed substantial haircuts on outstanding dues."]
    },
    "The Sahara Group Investor Refund Case": {
      incidence: "The Sahara India group, led by Subrata Roy, raised an enormous sum from millions of small investors through two group companies by issuing Optionally Fully Convertible Debentures (OFCDs). The collection, exceeding \u20b924,000 crore from an estimated two to three crore investors, was carried out without complying with legal requirements for a public issue of securities. SEBI determined that the group had effectively run a vast unregistered public offering disguised as a private placement \u2014 raising money from the public while bypassing mandatory disclosure, listing, and investor-protection norms. The records produced to substantiate millions of supposed investors were widely doubted, raising concerns that the structure was being used to route funds outside the regulated framework.",
      "Impact": ["Millions of small investors were exposed to instruments raised outside investor-protection safeguards, with the security of their money in serious doubt.","The mobilisation of tens of thousands of crores outside the regulated securities framework undermined the integrity of capital-raising rules.","The case tested the reach of SEBI\u2019s jurisdiction over hybrid instruments and exposed how easily public fund-raising could be dressed up as private placement.","The scale of the unregistered collection and contested investor records shook confidence in the policing of mass retail fund mobilisation.","The litigation produced landmark rulings clarifying SEBI\u2019s authority and the obligations attaching to public offerings of securities."],
      "Existing Laws": ["SEBI Act, 1992 (Sections 11, 11A and 11B) \u2014 invoked to assert SEBI\u2019s jurisdiction over the OFCD issuances, direct refunds, and restrain the group from further public fund-raising.","Companies Act provisions on Public Issues \u2014 applied to establish that the offer to a large number of persons constituted a public issue requiring listing and compliance the group had bypassed.","Securities Contracts (Regulation) Act, 1956 \u2014 engaged in relation to the issuance and dealing in securities and obligations triggered by a deemed public offering."],
      "Justice & Punishment": ["Supreme Court Refund Order (2012): The Supreme Court directed the two Sahara companies to refund the collected sums to investors with interest, depositing the money with SEBI for disbursement.","Detention of Subrata Roy (2014): When the group failed to comply with refund directions, the Supreme Court ordered Roy\u2019s detention; he spent an extended period in custody.","SEBI-Sahara Refund Account: SEBI established a dedicated refund mechanism, though a large portion of deposited funds remained unclaimed amid persistent doubts about the underlying investor records."]
    }
  }}
};

const FRAUD_TYPES=Object.keys(DATA);
let state={level:"home",fraud:null,case:null,detail:null};
const svg={
  chevronRight:`<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,18 15,12 9,6"/></svg>`,
  arrowLeft:`<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>`,
  impact:`<svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`,
  laws:`<svg viewBox="0 0 24 24"><path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>`,
  justice:`<svg viewBox="0 0 24 24"><path d="M12 22V12M12 12L3 7M12 12l9-5M3 7l9-5 9 5M3 7v10l9 5 9-5V7"/></svg>`
};
function addBot(c,h){const d=document.createElement("div");d.className="bubble bot animate-in";d.innerHTML=h;c.appendChild(d);}
function addLabel(c,t){const d=document.createElement("div");d.className="opts-label";d.textContent=t;c.appendChild(d);}
function addDiv(c){const d=document.createElement("div");d.className="divider";c.appendChild(d);}
function addBtn(c,num,label,fn,cls,icon){
  const b=document.createElement("button");
  b.className="opt-btn animate-in"+(cls?" "+cls:"");
  const n=num?`<span class="num">${num}</span>`:(icon?`<span class="icon-wrap">${icon}</span>`:"");
  b.innerHTML=`${n}<span class="btn-label">${label}</span><span class="chevron">${svg.chevronRight}</span>`;
  b.onclick=fn;c.appendChild(b);
}
function addBack(c,label,fn){
  const b=document.createElement("button");
  b.className="opt-btn back-btn animate-in";
  b.innerHTML=`<span style="display:flex;align-items:center;">${svg.arrowLeft}</span><span class="btn-label" style="margin-left:4px;">${label}</span>`;
  b.onclick=fn;c.appendChild(b);
}
function updateBC(){
  const bc=document.getElementById("breadcrumb");
  const parts=[];
  if(state.level!=="home")parts.push({label:"Home",goto:"home"});
  if(state.fraud&&state.level!=="fraud")parts.push({label:state.fraud,goto:"fraud"});
  if(state.case&&(state.level==="case"||state.level==="detail"))parts.push({label:state.case,goto:"case"});
  if(!parts.length){bc.classList.add("hidden");return;}
  bc.classList.remove("hidden");
  const cur=state.level==="detail"?state.detail:(state.level==="case"?state.case:(state.level==="fraud"?state.fraud:"Home"));
  bc.innerHTML=parts.map(p=>`<span class="bc-link" onclick="goTo('${p.goto}')">${p.label}</span><span class="bc-sep"> / </span>`).join("")+`<span class="bc-current">${cur}</span>`;
}
function render(){
  const msgs=document.getElementById("messages");
  const opts=document.getElementById("options-area");
  msgs.innerHTML="";opts.innerHTML="";
  updateBC();
  if(state.level==="home"){
    addBot(msgs,`Welcome! I\u2019m <strong>Corporate Fraud Intelligence</strong>, your guide on corporate fraud. I cover 5 categories of corporate fraud with real Indian case studies \u2014 5 cases each. Select a fraud type below to explore cases, applicable laws, and justice outcomes.`);
    addLabel(opts,"Select a fraud category:");
    FRAUD_TYPES.forEach((ft,i)=>{addBtn(opts,`${i+1}`,ft,()=>{state.level="fraud";state.fraud=ft;state.case=null;state.detail=null;render();});});
  } else if(state.level==="fraud"){
    const cases=Object.keys(DATA[state.fraud].cases);
    addBot(msgs,`You selected <strong>${state.fraud}</strong>. There are <strong>${cases.length} recorded cases</strong>. Choose a case to explore:`);
    addLabel(opts,"Select a case:");
    cases.forEach((c,i)=>{addBtn(opts,`${i+1}`,c,()=>{state.level="case";state.case=c;state.detail=null;render();});});
    addDiv(opts);
    addBack(opts,"Back to fraud categories",()=>{state.level="home";state.fraud=null;render();});
  } else if(state.level==="case"){
    const cd=DATA[state.fraud].cases[state.case];
    addBot(msgs,`<strong>${state.case}</strong>`);
    const card=document.createElement("div");
    card.className="incidence-card animate-in";
    card.innerHTML=`<span class="inc-label">Incidence of Fraud</span><br><br>${cd.incidence}`;
    msgs.appendChild(card);
    const hint=document.createElement("p");hint.className="hint-text";hint.textContent="Explore the details below:";msgs.appendChild(hint);
    addLabel(opts,"Select a detail:");
    addBtn(opts,null,"Impact",()=>{state.level="detail";state.detail="Impact";render();},"impact",svg.impact);
    addBtn(opts,null,"Existing Laws",()=>{state.level="detail";state.detail="Existing Laws";render();},"laws",svg.laws);
    addBtn(opts,null,"Justice & Punishment",()=>{state.level="detail";state.detail="Justice & Punishment";render();},"justice",svg.justice);
    addDiv(opts);
    addBack(opts,`Back to ${state.fraud} cases`,()=>{state.level="fraud";state.case=null;render();});
  } else if(state.level==="detail"){
    const cd=DATA[state.fraud].cases[state.case];
    const items=cd[state.detail];
    addBot(msgs,`<strong>${state.detail}</strong> \u2014 ${state.case}`);
    const dc=document.createElement("div");dc.className="detail-content animate-in";
    dc.innerHTML=`<ul>${items.map(it=>`<li><span>${it}</span></li>`).join("")}</ul>`;
    msgs.appendChild(dc);
    addLabel(opts,"Explore more:");
    const others=["Impact","Existing Laws","Justice & Punishment"].filter(d=>d!==state.detail);
    const cm={"Impact":"impact","Existing Laws":"laws","Justice & Punishment":"justice"};
    const sm={"Impact":svg.impact,"Existing Laws":svg.laws,"Justice & Punishment":svg.justice};
    others.forEach(d=>{addBtn(opts,null,d,()=>{state.detail=d;render();},cm[d],sm[d]);});
    addDiv(opts);
    addBack(opts,"Back to case overview",()=>{state.level="case";render();});
  }
  msgs.scrollTop=msgs.scrollHeight;
}
function goTo(level){
  if(level==="home"){state.level="home";state.fraud=null;state.case=null;state.detail=null;}
  else if(level==="fraud"){state.level="fraud";state.case=null;state.detail=null;}
  else if(level==="case"){state.level="case";state.detail=null;}
  render();
}
render();
</script>
</body>
</html>
